site_name: microNeo
site_description: Terminal Markdown Editor — render and edit in the same window
site_url: https://sollawen.github.io/microNeo/
repo_url: https://github.com/sollawen/microNeo
repo_name: sollawen/microNeo
edit_uri: edit/master/docs/website/
docs_dir: docs/website
site_dir: site
exclude_docs: |
  AGENTS.md

theme:
  name: material
  language: en
  custom_dir: docs/website/_overrides
  features:
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          default: true
          nav_translations:
            Introduction: 简介
            Quick Start: 快速开始
            Settings: Settings.json
            Syntax: 语法高亮
            Config: 配置
            FAQ: 常见问题

# extra.alternate 由 i18n 插件自动生成，无需手写
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sollawen/microNeo

nav:
  - Introduction: index.md
  - Quick Start: quick-start.md
  - Config:
      - Settings.json: settings.md
      - theme.md
      - Syntax: syntax.md
  - FAQ: faq.md
