{% set current = config.theme.language %}
{% set target_lang = 'zh' if current == 'en' else 'en' %}

{% for alt in config.extra.alternate %}
  {% if alt.lang == target_lang %}
    <a href="{{ alt.link }}"
       hreflang="{{ alt.lang }}"
       class="md-header__button"
       aria-label="Switch to {{ alt.name }}"
       style="display:inline-flex;align-items:center;text-decoration:none;color:currentcolor;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 20" width="60" height="20" aria-hidden="true">
        <text x="30" y="14" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="currentColor">中文/En</text>
      </svg>
    </a>
  {% endif %}
{% endfor %}
